
name: Linux

on:
  workflow_dispatch

jobs:

  linux-native-build-run:
    runs-on: ubuntu-latest
    steps:

# Toolchain + git

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install build tools
        run: python -m pip install meson ninja

# Build

      - name: Build all examples for ${{ matrix.target }}
        run: |
          for example in t01_tcp-echo-server t02_multithreading-mandelbrot t03_log-catching; do
            mkdir -p $example/build-${{ matrix.target }}
            cd $example/build-${{ matrix.target }}
            echo "=== Building $example for ${{ matrix.target }} with meson ==="
            meson setup --cross-file ../../tools-dev/cross/meson-cross-${{ matrix.target }}.txt . ..
            meson compile
            ./app
            rm -rf *
            cmake ..
            make -j
            ./app
            rm -rf *
            make -f ../Makefile -j
            ./app
            rm -rf *
          done

