
name: MacOS

on:
  workflow_dispatch

jobs:

  macos-native-build-run:
    runs-on: macos-14
    defaults:
      run:
        working-directory: tools/hello-world
    steps:

# Toolchain + git

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install build tools
        run: python -m pip install meson ninja

# Build

      - name: Build all examples for ${{ matrix.target }}
        run: |
          for example in t01_tcp-echo-server t02_multithreading-mandelbrot t03_log-catching; do
            mkdir -p $example/build-native
            cd $example/build-native
            echo "=== Building $example with meson ==="
            meson setup . ..
            meson compile
            ./app --help
            rm -rf *
            cmake ..
            make -j
            ./app --help
            rm -rf *
            make -f ../Makefile -j
            ./app --help
            rm -rf *
            cd ../..
          done

