
name: ARM, RISC-V & MinGW

on:
  workflow_dispatch

jobs:

  cross-build-run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [arm, riscv, mingw]
    steps:

# Toolchain + git

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu \
            mingw-w64 build-essential cmake

      - name: Setup mingw
        if: matrix.target == 'mingw'
        run: sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install build tools
        run: python -m pip install meson ninja

# Build

      - name: Build all examples for ${{ matrix.target }}
        run: |
          for example in t01_tcp-echo-server t02_multithreading-mandelbrot t03_log-catching; do
            mkdir -p $example/build-${{ matrix.target }}
            cd $example/build-${{ matrix.target }}
            echo "=== Building $example for ${{ matrix.target }} with meson ==="
            meson setup --cross-file ../../tools-dev/cross/meson-cross-${{ matrix.target }}.txt . ..
            meson compile
            ./app
            rm -rf *
          done

