
name: Windows

on:
  workflow_dispatch

jobs:

  windows-native-build-run:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/hello-world
    steps:

# Toolchain + git

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Visual Studio Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install build tools
        run: python -m pip install meson ninja

# Build

      - name: Build all examples
        run: |
          for example in t01_tcp-echo-server t02_multithreading-mandelbrot t03_log-catching; do
            mkdir -p $example/build-native
            cd $example/build-native
            echo "=== Building $example with meson ==="
            meson setup . ..
            meson compile
            ./App.exe --help
            rm -rf *
            cmake ..
            make -j
            ./App.exe --help
            rm -rf *
            make -f ../Makefile -j
            ./App.exe --help
            rm -rf *
            cd ../..
          done

